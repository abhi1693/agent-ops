{% load static %}
<!DOCTYPE html>
<html lang="en" data-agent-ops-url-name="{{ request.resolver_match.url_name|default:'' }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="initial-scale=1, maximum-scale=5, width=device-width, viewport-fit=cover">

    <title>{% block title %}Home{% endblock %} | {{ agent_ops_ui.app_name }}</title>

    <script src="{% static 'ui/theme-mode.js' %}"></script>
    <script>
      (function () {
        try {
          const preferredTheme = "{{ agent_ops_ui.theme|default:'system' }}";
          if (preferredTheme === "light" || preferredTheme === "dark") {
            setMode(preferredTheme);
          } else {
            localStorage.removeItem("app-ui-color-mode");
            initMode();
          }
        } catch (error) {
          console.error(error);
          initMode();
        }
        window.CSRF_TOKEN = "{{ csrf_token }}";
      })();

      document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll(".color-mode-toggle").forEach(function (button) {
          button.addEventListener("click", function (event) {
            event.preventDefault();
            const nextMode = document.documentElement.getAttribute("data-bs-theme") === "dark" ? "light" : "dark";
            setMode(nextMode);
          });
        });

        document.querySelectorAll("#django-messages .toast").forEach(function (element) {
          if (window.Toast) {
            new window.Toast(element).show();
          }
        });
      });
    </script>

    <link rel="stylesheet" href="{% static 'ui/vendor.css' %}">
    <link rel="stylesheet" href="{% static 'ui/app-ui.css' %}">
    <link rel="stylesheet" href="{% static 'ui/shell.css' %}">
    <link rel="icon" type="image/svg+xml" href="{% static 'ui/app-icon.svg' %}">

    <script src="{% static 'ui/app-ui.js' %}" defer></script>

    {% block head %}{% endblock %}
  </head>
  <body>
    {% block layout %}{% endblock %}

    {% include "inc/messages.html" %}

    {% block javascript %}{% endblock %}
  </body>
</html>
