{% extends "base.html" %}

{% block title %}Delete Token | Agent Ops{% endblock %}

{% block content %}
  <div class="actions">
    <div>
      <h1>Delete API token</h1>
      <p class="muted">This action cannot be undone.</p>
    </div>
    <a class="button-link" href="{% url 'token_list' %}">Cancel</a>
  </div>

  <section class="card">
    <div class="card-body stack">
      <p>Delete <strong>{{ object.masked_key }}</strong>?</p>
      <form method="post">
        {% csrf_token %}
        <button type="submit">Delete token</button>
      </form>
    </div>
  </section>
{% endblock %}
